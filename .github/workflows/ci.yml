name: CI — Lint & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint script.js api/submit.js

      - name: Run Stylelint
        run: npx stylelint "styles.css"

      - name: Run HTML Validate
        run: npx html-validate "*.html"

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lighthouse audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://jasperaviles54.github.io/portfolio/
            https://jasperaviles54.github.io/portfolio/about.html
            https://jasperaviles54.github.io/portfolio/skills.html
            https://jasperaviles54.github.io/portfolio/projects.html
            https://jasperaviles54.github.io/portfolio/contacts.html
          budgetPath: .lighthouserc.json
          uploadArtifacts: true
